global:
  scrape_interval: 3s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    metrics_path: '/prometheus/metrics'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node'
    scrape_interval: 3s
    static_configs:
      - targets: ['node_exporter:9100']