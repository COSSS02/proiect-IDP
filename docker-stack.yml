version: '3.8'

services:
  server:
    image: e-shop-server:build
    env_file:
      - ./server/.env
    volumes:
      - ./server/certs:/app/certs:ro
    networks:
      - internal-net
      - db-net
      - cache-net
      - outbound-net
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
      labels:
        - "kong.service=server"
        - "kong.upstream=server:3000"

  client:
    image: e-shop-client:build
    env_file:
      - ./client/.env
    volumes:
      - ./client/certs:/app/certs:ro
    networks:
      - internal-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "kong.service=client"
        - "kong.upstream=client:5173"

  redis:
    image: redis:7-alpine
    networks:
      - cache-net
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm --verbose
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=${KEYCLOAK_DB}
      - KC_DB_URL_HOST=${KEYCLOAK_DB_URL_HOST}
      - KC_DB_URL_DATABASE=${MARIADB_DATABASE}
      - KC_DB_USERNAME=${MARIADB_USER}
      - KC_DB_PASSWORD=${MARIADB_PASSWORD}
      - KC_HTTP_PORT=${KEYCLOAK_HTTP_PORT}
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY=edge
      - KC_HTTP_RELATIVE_PATH=/auth
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    networks:
      - internal-net
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "kong.service=keycloak"
        - "kong.upstream=keycloak:8080"

  kong:
    image: kong:latest
    volumes:
      - ./kong:/usr/local/kong/declarative
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "80:8000"
      - "443:8443"
      - 8001:8001
      - 8444:8444
    networks:
      - gateway-net
      - internal-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mariadb:
    image: mariadb:latest
    command: --innodb-use-native-aio=0
    volumes:
      - keycloak_db_data:/var/lib/mysql
      - ./mariadb:/docker-entrypoint-initdb.d
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    networks:
      - db-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  adminer:
    image: adminer
    networks:
      - internal-net
      - db-net
    environment:
      - ADMINER_DEFAULT_SERVER=mariadb
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "kong.service=adminer"
        - "kong.upstream=adminer:8080"

networks:
  gateway-net:
    driver: overlay
  internal-net:
    driver: overlay
    internal: true
  db-net:
    driver: overlay
    internal: true
  cache-net:
    driver: overlay
    internal: true
  outbound-net:
    driver: overlay

volumes:
  keycloak_db_data:
  redis_data:
