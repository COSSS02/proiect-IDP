services:
  server:
    image: cosss02/e-shop-server:build
    env_file:
      - ./server/.env
    volumes:
      - ./server/certs:/app/certs:ro
    networks:
      - app-net
      - auth-net
      - db-net
      - cache-net
      - outbound-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      labels:
        - "deploy.group=api"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"
        - "kong.service=server"
        - "kong.upstream=server:3000"

  client:
    image: cosss02/e-shop-client:build
    env_file:
      - ./client/.env
    volumes:
      - ./client/certs:/app/certs:ro
    networks:
      - app-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "deploy.group=api"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"
        - "kong.service=client"
        - "kong.upstream=client:5173"

  redis:
    image: redis:7-alpine
    networks:
      - cache-net
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        - "deploy.group=infrastructure"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm --verbose
    env_file:
      - ./.env
    environment:
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY=edge
      - KC_HTTP_RELATIVE_PATH=/auth
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    networks:
      - auth-net
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "deploy.group=api"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"
        - "kong.service=keycloak"
        - "kong.upstream=keycloak:8080"

  kong:
    image: kong:latest
    volumes:
      - ./kong:/usr/local/kong/declarative
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "80:8000"
      - "443:8443"
      - "8001:8001"
      - "8444:8444"
    networks:
      - gateway-net
      - app-net
      - auth-net
      - monitoring-net
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "deploy.group=infrastructure"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"

  mariadb:
    image: mariadb:latest
    command: --innodb-use-native-aio=0
    env_file:
      - ./.env
    volumes:
      - keycloak_db_data:/var/lib/mysql
      - ./mariadb:/docker-entrypoint-initdb.d
    networks:
      - db-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        - "deploy.group=data"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"

  adminer:
    image: adminer
    networks:
      - db-net
    environment:
      - ADMINER_DEFAULT_SERVER=e-shop_mariadb
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "deploy.group=infrastructure"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"
        - "kong.service=adminer"
        - "kong.upstream=adminer:8080"

  prometheus:
    image: prom/prometheus
    volumes:
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--web.external-url=/prometheus'
    networks:
        - monitoring-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "deploy.group=monitoring"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"

  node_exporter:
    image: prom/node-exporter
    volumes:
        - /proc:/host/proc:ro
        - /sys:/host/sys:ro
        - /:/rootfs:ro
    command:
        - '--path.procfs=/host/proc'
        - '--path.rootfs=/rootfs'
        - '--path.sysfs=/host/sys'
        - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        - '--collector.systemd'
        - '--collector.processes'
    networks:
        - monitoring-net
    deploy:
      mode: global
      labels:
        - "deploy.group=monitoring"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"

  grafana:
    image: grafana/grafana
    environment:
        - GF_SERVER_HTTP_PORT=3001
        - GF_SERVER_SERVE_FROM_SUB_PATH=true
        - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
        - GF_ASSET_SERVING_BASE_URL=%(protocol)s://%(domain)s/grafana/assets/
    volumes:
        - grafana-volume:/var/lib/grafana
        - ./grafana/provisioning:/etc/grafana/provisioning:ro
        - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        - "deploy.group=monitoring"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"
    networks:
        - monitoring-net

  portainer:
    image: portainer/portainer-ce:latest
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9000:9000"
    networks:
      - gateway-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
      labels:
        - "deploy.group=infrastructure"
        - "deploy.version=1.0.0"
        - "deploy.environment=production"

networks:
  gateway-net:
    driver: overlay
  app-net:
    driver: overlay
    internal: true
  auth-net:
    driver: overlay
    internal: true
  db-net:
    driver: overlay
    internal: true
  cache-net:
    driver: overlay
    internal: true
  monitoring-net:
    driver: overlay
    internal: true
  outbound-net:
    driver: overlay

volumes:
  keycloak_db_data:
  redis_data:
  grafana-volume:
  portainer_data: