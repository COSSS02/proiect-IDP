version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
      target: dev
    image: e-shop-server:build
    container_name: e-shop-server-dev
    restart: "no"
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/certs:/app/certs:ro
    networks:
      - public-net
      - db-net
      - cache-net
    depends_on:
      - keycloak

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
      target: dev
    image: e-shop-client:build
    container_name: e-shop-client-dev
    restart: "no"
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules
      - ./client/certs:/app/certs:ro
    environment:
      - CHOKIDAR_USEPOLLING=1
    networks:
      - public-net
    depends_on:
      - server

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cache-net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-server
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=mariadb
      - KC_DB_URL_HOST=mariadb
      - KC_DB_URL_DATABASE=${MARIADB_DATABASE}
      - KC_DB_USERNAME=${MARIADB_USER}
      - KC_DB_PASSWORD=${MARIADB_PASSWORD}
      - KC_HTTP_PORT=8080
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME=localhost
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    networks:
      - public-net
      - db-net
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    command: --innodb-use-native-aio=0
    volumes:
      - keycloak_db_data:/var/lib/mysql
      - ./mariadb:/docker-entrypoint-initdb.d
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    networks:
      - db-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: adminer
    networks:
      - public-net
      - db-net
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mariadb

networks:
  public-net:
    driver: bridge
  db-net:
    driver: bridge
  cache-net:
    driver: bridge

volumes:
  keycloak_db_data:
  redis_data: